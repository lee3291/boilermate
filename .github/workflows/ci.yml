name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # - This step was split into multiple steps before (install, generate, build).
      #   Combining them into one step ensures the build uses the exact 'node_modules'
      #   that were just installed. This fixes the "@swc/core" native binding error, which
      #   happens when the build step runs in a slightly different environment than the install step.
      #
      # - Switched 'npm install' to 'npm ci'.
      #   'npm ci' stands for "Clean Install" and is the recommended command for CI/CD.
      #   It performs a faster, more reliable install directly from the 'package-lock.json'
      #   file, guaranteeing a consistent build every time.
      - name: Install, Generate, and Build backend
        run: |
          npm ci
          npx prisma validate && npm run prisma:generate
          npm run build
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # - Clear the npm cache between backend and frontend installs.
      #   This prevents the frontend install from using a potentially incompatible
      #   native binding (like @swc/core) that was cached by the backend install,
      #   which was causing the build to fail.
      - name: Clear npm cache
        run: npm cache clean --force

      # - This step was also split before (install, build).
      #   Same reason as the backend. Combining 'npm ci' and 'npm run build'
      #   ensures the build environment is consistent and prevents the native binding error.
      - name: Install and Build frontend
        run: |
          npm ci
          npm run build
        working-directory: ./frontend
